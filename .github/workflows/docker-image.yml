name: Docker Image CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERPW }}" | docker login -u "panmourovaty" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          outputs: |
            type=image,name=panmourovaty/rustvideoplatform-processor:latest-${{ matrix.arch }},push=true
            type=local,dest=/tmp/build-output

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: rustvideoplatform-processor-linux-${{ matrix.arch }}
          path: /tmp/build-output/opt/rustvideoplatform-processor
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERPW }}" | docker login -u "panmourovaty" --password-stdin

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag panmourovaty/rustvideoplatform-processor:latest \
            panmourovaty/rustvideoplatform-processor:latest-amd64 \
            panmourovaty/rustvideoplatform-processor:latest-arm64
