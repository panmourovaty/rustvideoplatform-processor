name: Docker Image CI

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERPW }}" | docker login -u "panmourovaty" --password-stdin

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          outputs: |
            type=image,name=panmourovaty/rustvideoplatform-processor,push-by-digest=true,push=true
            type=local,dest=/tmp/build-output

      - name: Upload digest
        run: |
          mkdir /tmp/digest
          printf '%s' "${{ steps.build.outputs.digest }}" > /tmp/digest/${{ matrix.arch }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digest/${{ matrix.arch }}.txt

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rustvideoplatform-processor-linux-${{ matrix.arch }}
          path: /tmp/build-output/opt/rustvideoplatform-processor
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    needs: build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERPW }}" | docker login -u "panmourovaty" --password-stdin

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag panmourovaty/rustvideoplatform-processor:latest \
            "panmourovaty/rustvideoplatform-processor@$(cat /tmp/digests/digest-amd64/amd64.txt)" \
            "panmourovaty/rustvideoplatform-processor@$(cat /tmp/digests/digest-arm64/arm64.txt)"
